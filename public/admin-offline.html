<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Invita Plus Admin sin conexion</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #081126;
            --surface: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
            --text: #f8fafc;
            --soft: rgba(226, 232, 240, 0.76);
            --primary: #4f7cff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: radial-gradient(circle at top left, rgba(79, 124, 255, 0.22), transparent 34%), var(--bg);
            color: var(--text);
            font-family: Sora, Manrope, ui-sans-serif, system-ui, sans-serif;
        }

        main {
            width: min(520px, 100%);
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--surface);
            padding: 28px;
            box-shadow: 0 32px 90px rgba(2, 6, 23, 0.42);
            backdrop-filter: blur(18px);
        }

        .mark {
            display: grid;
            width: 58px;
            height: 58px;
            place-items: center;
            border-radius: 20px;
            background: var(--primary);
            color: white;
            font-weight: 900;
            box-shadow: 0 18px 36px rgba(79, 124, 255, 0.32);
        }

        h1 {
            margin: 22px 0 10px;
            font-size: clamp(2rem, 8vw, 3rem);
            line-height: 1;
        }

        p {
            margin: 0;
            color: var(--soft);
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <main>
        <div class="mark">IP</div>
        <h1>Panel sin conexion</h1>
        <p>No se pudo cargar el panel administrativo. Revisa tu conexion e intenta abrir Invita Plus Admin nuevamente.</p>
    </main>
</body>
</html>
